name: update-profile-art

# Re-scrape public contribution data and re-render the heatmap SVG daily.
# Zero auth: the scraper hits GitHub's public contributions fragment, and the
# push uses the workflow's own GITHUB_TOKEN (permissions below).

on:
  schedule:
    - cron: "17 5 * * *"   # daily, 05:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch contributions + render heatmap
        env:
          GH_PROFILE_USER: shreyas463
        run: |
          python scripts/fetch_contributions.py
          python scripts/render_heatmap_svg.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          git diff --staged --quiet && echo "no changes" && exit 0
          git commit -m "chore: refresh contribution graph"
          git push
